# ============================================
# Docker Compose — Template Platform v2.0
# ============================================
# Supabase-first: DB and Auth are in Supabase Cloud.
# This compose provides only local dev services (Redis, optional Keycloak).
# Run: docker compose --env-file .env up -d

services:
  # Redis (for caching/sessions) — password protected
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  # Keycloak (OIDC Authentication) — optional, only if NEXT_PUBLIC_AUTH_PROVIDER=keycloak
  # Start with: docker compose --profile keycloak up -d
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    command: start-dev --import-realm
    ports:
      - '${KEYCLOAK_HTTP_PORT:-8080}:8080'
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    profiles:
      - keycloak

  # Next.js Frontend (production build)
  # For dev: use `pnpm dev` directly instead
  frontend:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Template Platform}
      NEXT_PUBLIC_AUTH_PROVIDER: ${NEXT_PUBLIC_AUTH_PROVIDER:-supabase}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
