# Kubernetes Deployment Manifests for Template Platform
# Apply with: kubectl apply -f deployment.yaml

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: template-platform
  labels:
    app.kubernetes.io/name: template-platform

---
# ConfigMap for environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: template-platform-config
  namespace: template-platform
data:
  NODE_ENV: "production"
  FRONTEND_URL: "http://web-service:80"
  LOG_LEVEL: "info"
  RATE_LIMIT_DEFAULT: "100/minute"

---
# Secret for sensitive data
# IMPORTANT: Do NOT store real secrets here. Use one of:
#   - Sealed Secrets: kubeseal < secret.yaml > sealed-secret.yaml
#   - External Secrets Operator: reference from AWS SM / Vault
#   - kubectl create secret generic template-platform-secrets --from-literal=...
apiVersion: v1
kind: Secret
metadata:
  name: template-platform-secrets
  namespace: template-platform
type: Opaque
stringData:
  DATABASE_URL: "[CONFIGURE_ME_SUPABASE_CONNECTION_STRING]"
  REDIS_URL: "[CONFIGURE_ME_REDIS_URL]"
  JWT_SECRET: "[CONFIGURE_ME_MIN_32_CHARS]"
  CSRF_SECRET_KEY: "[CONFIGURE_ME_MIN_32_CHARS]"
  SUPABASE_SERVICE_ROLE_KEY: "[CONFIGURE_ME_SUPABASE_SERVICE_KEY]"

---
# Web Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: template-platform
  labels:
    app: web
    app.kubernetes.io/name: template-platform
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: template-platform/web:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5

---
# Web Service
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: template-platform
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: template-platform-ingress
  namespace: template-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.example.com
      secretName: template-platform-tls
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service
                port:
                  number: 80

---
# Horizontal Pod Autoscaler for Web
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-hpa
  namespace: template-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# PodDisruptionBudget for Web
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-pdb
  namespace: template-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: web
