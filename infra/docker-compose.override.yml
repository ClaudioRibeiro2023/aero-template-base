# Docker Compose Override for Local Development
# This file is automatically loaded when running `docker-compose up`

services:
  # PostgreSQL with exposed port for local tools
  db:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis with exposed port
  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  # Frontend dev server (optional, usually run locally)
  # Uncomment if you want to run frontend in Docker
  # web:
  #   build:
  #     context: ../apps/web
  #     dockerfile: Dockerfile
  #     target: development
  #   volumes:
  #     - ../apps/web:/app
  #     - /app/node_modules
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321
  #     - NEXT_PUBLIC_SUPABASE_ANON_KEY=your-anon-key

volumes:
  postgres_data:
