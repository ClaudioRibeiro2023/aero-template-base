name: API Routes CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/web/app/api/**'
      - 'packages/shared/src/supabase/**'
      - 'supabase/migrations/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/web/app/api/**'
      - 'packages/shared/src/supabase/**'
      - 'supabase/migrations/**'

jobs:
  typecheck:
    name: Type Check API Routes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @template/web exec tsc --noEmit

  migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migration SQL syntax
        run: |
          for f in supabase/migrations/*.sql; do
            echo "Checking: $f"
            # Basic syntax validation
            if ! grep -q "create\|alter\|insert\|drop" "$f"; then
              echo "WARNING: $f may be empty or invalid"
            fi
          done
          echo "All migrations validated"
